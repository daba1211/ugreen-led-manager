services:
  ugreen-led-manager:
    build: .
    container_name: ugreen-led-manager
    restart: unless-stopped
    ports:
      - "8088:8080"
    environment:
      TZ: Europe/Berlin
      LED_MODE: mock
      LED_CONFIG_PATH: /app/config/led-config.json
      LED_MONITOR_ENABLED: "false"
    volumes:
      - ./config:/app/config
