<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UGREEN LED Manager</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="brand">
                <img src="/static/logo.svg" alt="UGREEN LED Manager Logo" class="brand-logo">
                <div>
                    <h1 id="titleText">UGREEN LED Manager</h1>
                    <p id="subtitleText">LED-Konfiguration für UGREEN DXP</p>
                </div>
            </div>

            <div class="lang-switch">
                <button id="langDeBtn" class="lang-btn" type="button">DE</button>
                <button id="langEnBtn" class="lang-btn" type="button">EN</button>
            </div>
        </div>
    </header>

    <main class="page">
        <section class="status-card">
            <div>
                <h2 id="statusHeading">Status</h2>
                <p id="statusText">Lade Status ...</p>
                <p id="preflightText">Host-Check wird geladen ...</p>
            </div>
            <div class="status-actions">
                 <button id="checkBtn" class="btn btn-secondary" type="button">Host prüfen</button>
                 <button id="fixBtn" class="btn btn-secondary" type="button">Host vorbereiten</button>
                 <button id="saveBtn" class="btn btn-secondary" type="button">Speichern</button>
                 <button id="offBtn" class="btn btn-secondary" type="button">Alles aus</button>
                 <button id="applyBtn" class="btn btn-primary" type="button">Speichern & Anwenden</button>
            </div>
            </div>
        </section>

        <section class="grid">
            <div class="card">
                <h2 id="generalHeading">Allgemein</h2>
                <div id="generalControls"></div>
            </div>

            <div class="card card-wide">
                <h2 id="diskHeading">Disks</h2>
                <div id="diskGrid" class="disk-grid"></div>
            </div>
        </section>

        <section class="card">
            <h2 id="resultHeading">Antwort</h2>
            <pre id="resultBox">Noch keine Aktion ausgeführt.</pre>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
