<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UGREEN LED Manager</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <h1>UGREEN LED Manager</h1>
            <p>LED-Konfiguration für UGREEN DXP</p>
        </div>
    </header>

    <main class="page">
        <section class="status-card">
            <div>
                <h2>Status</h2>
                <p id="statusText">Lade Status ...</p>
            </div>
            <div class="status-actions">
                 <button id="saveBtn" class="btn btn-secondary">Speichern</button>
                 <button id="offBtn" class="btn btn-secondary">Alles aus</button>
                 <button id="applyBtn" class="btn btn-primary">Speichern & Anwenden</button>
            </div>
        </section>

        <section class="grid">
            <div class="card">
                <h2>Allgemein</h2>

                <div class="field-row">
                    <label for="power">Power</label>
                    <div class="input-wrap">
                        <input type="color" id="power">
                        <span class="preview" id="preview-power"></span>
                    </div>
                </div>

                <div class="field-row">
                    <label for="netdev">Netzwerk</label>
                    <div class="input-wrap">
                        <input type="color" id="netdev">
                        <span class="preview" id="preview-netdev"></span>
                    </div>
                </div>
            </div>

            <div class="card card-wide">
                <h2>Disks</h2>
                <div class="disk-grid">
                    <div class="disk-card">
                        <h3>Disk 1</h3>
                        <div class="field-row">
                            <label for="disk1-active">Aktiv</label>
                            <div class="input-wrap">
                                <input type="color" id="disk1-active">
                                <span class="preview" id="preview-disk1-active"></span>
                            </div>
                        </div>
                        <div class="field-row">
                            <label for="disk1-standby">Standby</label>
                            <div class="input-wrap">
                                <input type="color" id="disk1-standby">
                                <span class="preview" id="preview-disk1-standby"></span>
                            </div>
                        </div>
                        <div class="field-row">
                            <label for="disk1-error">Fehler</label>
                            <div class="input-wrap">
                                <input type="color" id="disk1-error">
                                <span class="preview" id="preview-disk1-error"></span>
                            </div>
                        </div>
                    </div>

                    <div class="disk-card">
                        <h3>Disk 2</h3>
                        <div class="field-row">
                            <label for="disk2-active">Aktiv</label>
                            <div class="input-wrap">
                                <input type="color" id="disk2-active">
                                <span class="preview" id="preview-disk2-active"></span>
                            </div>
                        </div>
                        <div class="field-row">
                            <label for="disk2-standby">Standby</label>
                            <div class="input-wrap">
                                <input type="color" id="disk2-standby">
                                <span class="preview" id="preview-disk2-standby"></span>
                            </div>
                        </div>
                        <div class="field-row">
                            <label for="disk2-error">Fehler</label>
                            <div class="input-wrap">
                                <input type="color" id="disk2-error">
                                <span class="preview" id="preview-disk2-error"></span>
                            </div>
                        </div>
                    </div>

                    <div class="disk-card">
                        <h3>Disk 3</h3>
                        <div class="field-row">
                            <label for="disk3-active">Aktiv</label>
                            <div class="input-wrap">
                                <input type="color" id="disk3-active">
                                <span class="preview" id="preview-disk3-active"></span>
                            </div>
                        </div>
                        <div class="field-row">
                            <label for="disk3-standby">Standby</label>
                            <div class="input-wrap">
                                <input type="color" id="disk3-standby">
                                <span class="preview" id="preview-disk3-standby"></span>
                            </div>
                        </div>
                        <div class="field-row">
                            <label for="disk3-error">Fehler</label>
                            <div class="input-wrap">
                                <input type="color" id="disk3-error">
                                <span class="preview" id="preview-disk3-error"></span>
                            </div>
                        </div>
                    </div>

                    <div class="disk-card">
                        <h3>Disk 4</h3>
                        <div class="field-row">
                            <label for="disk4-active">Aktiv</label>
                            <div class="input-wrap">
                                <input type="color" id="disk4-active">
                                <span class="preview" id="preview-disk4-active"></span>
                            </div>
                        </div>
                        <div class="field-row">
                            <label for="disk4-standby">Standby</label>
                            <div class="input-wrap">
                                <input type="color" id="disk4-standby">
                                <span class="preview" id="preview-disk4-standby"></span>
                            </div>
                        </div>
                        <div class="field-row">
                            <label for="disk4-error">Fehler</label>
                            <div class="input-wrap">
                                <input type="color" id="disk4-error">
                                <span class="preview" id="preview-disk4-error"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="card">
            <h2>Antwort</h2>
            <pre id="resultBox">Noch keine Aktion ausgeführt.</pre>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
